<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Task Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --surface2: #141414;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #e8e8e8;
            --text-muted: #555;
            --text-dim: #888;
            --accent: #c8ff00;
            --accent-dim: rgba(200, 255, 0, 0.08);
            --accent-border: rgba(200, 255, 0, 0.25);
            --blue: #4a9eff;
            --blue-dim: rgba(74, 158, 255, 0.08);
            --blue-border: rgba(74, 158, 255, 0.25);
            --red: #ff5a5a;
            --red-dim: rgba(255, 90, 90, 0.08);
            --red-border: rgba(255, 90, 90, 0.2);
            --green: #4ade80;
            --green-dim: rgba(74, 222, 128, 0.08);
            --font-ui: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ─── LOGIN ─── */
        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background:
                radial-gradient(ellipse 60% 40% at 50% -10%, rgba(200,255,0,0.07) 0%, transparent 60%),
                var(--bg);
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 44px 40px;
            width: 100%;
            max-width: 380px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .login-logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #000;
            font-weight: 700;
        }

        .login-logo h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .field-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .login-box input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 14px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font-ui);
            transition: border-color 0.15s;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.15s;
            margin-top: 4px;
        }

        .btn-login:hover { opacity: 0.88; }

        /* ─── APP ─── */
        .app-wrap { display: none; min-height: 100vh; }
        .app-wrap.active { display: block; }

        .app-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 24px 60px;
        }

        /* ─── TOPBAR ─── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-logo-mark {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #000;
            font-weight: 700;
        }

        .topbar-logo span {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .btn-logout {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-logout:hover {
            border-color: var(--red-border);
            color: var(--red);
            background: var(--red-dim);
        }

        .btn-pdf {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: all 0.15s;
        }

        .btn-pdf:hover {
            border-color: var(--accent-border);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-pdf:disabled {
            opacity: 0.45;
            cursor: default;
            pointer-events: none;
        }

        /* ─── DATE NAV ─── */
        .date-nav-wrap {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .btn-daynav {
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            font-family: var(--font-ui);
        }

        .btn-daynav:hover {
            background: var(--border2);
            color: var(--text);
        }

        .date-center {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .date-primary {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .date-pills {
            display: flex;
            gap: 8px;
        }

        .date-pill {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .pill-day {
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            color: var(--accent);
        }

        .pill-qs {
            background: var(--blue-dim);
            border: 1px solid var(--blue-border);
            color: var(--blue);
            font-family: var(--font-mono);
            font-size: 10px;
        }

        .date-input-wrap {
            display: flex;
            align-items: center;
        }

        .date-picker {
            padding: 7px 10px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .date-picker:focus { outline: none; border-color: var(--accent); }
        .date-picker::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

        /* ─── PROGRESS ROW ─── */
        .progress-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .progress-dot {
            flex: 1;
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
        }

        .progress-dot.done {
            background: var(--accent);
        }

        .progress-dot.partial {
            background: linear-gradient(90deg, var(--accent) 50%, var(--surface2) 50%);
        }

        /* ─── TABLE ─── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 11px 16px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: rgba(255,255,255,0.015); }

        /* Q number cell */
        .q-cell {
            text-align: center;
        }

        .q-global {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .q-local {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Editable title */
        .editable-cell {
            min-width: 200px;
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 14px;
            color: var(--text);
            background: transparent;
            cursor: text;
            transition: background 0.15s;
            min-height: 34px;
            display: flex;
            align-items: center;
        }

        .editable-cell:hover { background: var(--surface2); }
        .editable-cell.editing { background: var(--bg); outline: 1px solid var(--border2); }

        .editable-cell input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font-ui);
            width: 100%;
        }

        .editable-cell input:focus { outline: none; }

        .title-placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Links cell */
        .links-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .link-chip {
            padding: 3px 9px;
            background: var(--blue-dim);
            border: 1px solid var(--blue-border);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--blue);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .link-chip:hover {
            background: rgba(74, 158, 255, 0.15);
            color: #6fb3ff;
        }

        .btn-add-link {
            padding: 3px 9px;
            background: transparent;
            border: 1px dashed var(--border2);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-ui);
            transition: all 0.12s;
        }

        .btn-add-link:hover {
            border-color: var(--blue-border);
            color: var(--blue);
            background: var(--blue-dim);
        }

        /* Revision bubbles */
        .bubbles {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .bubble {
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--border2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.12s;
        }

        .bubble.on {
            background: var(--accent);
            border-color: var(--accent);
        }

        .bubble:hover { border-color: var(--text-dim); }
        .bubble.on:hover { opacity: 0.8; }

        /* Solutions button */
        .btn-solutions {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .btn-solutions:hover {
            border-color: rgba(200,255,0,0.3);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-solutions.has-solutions {
            border-color: var(--accent-border);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ─── MODALS BASE ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 900;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            width: 100%;
            position: relative;
            animation: modalIn 0.15s ease-out;
        }

        @keyframes modalIn {
            from { transform: translateY(8px) scale(0.98); opacity: 0; }
            to { transform: none; opacity: 1; }
        }

        .modal-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-head h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .modal-head h2 strong {
            color: var(--text);
            font-weight: 600;
        }

        .btn-close {
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-ui);
            transition: all 0.12s;
        }

        .btn-close:hover { background: var(--surface2); color: var(--text); }

        /* ─── SOLUTIONS MODAL ─── */
        #solModal .modal-box {
            max-width: 1050px;
            height: 86vh;
            display: flex;
            flex-direction: column;
        }

        /* Tabs row */
        .sol-tabs {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            padding: 0 20px;
            gap: 2px;
            flex-shrink: 0;
        }

        .sol-tab {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-ui);
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.12s;
            letter-spacing: 0.2px;
        }

        .sol-tab:hover { color: var(--text-dim); }
        .sol-tab.active { color: var(--text); border-bottom-color: var(--accent); }

        .sol-tab-add {
            padding: 10px 12px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.12s;
        }

        .sol-tab-add:hover { color: var(--accent); }

        /* Solution body */
        .sol-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px 20px;
            min-height: 0;
        }

        .sol-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 12px;
        }

        .sol-panel.active { display: flex; }

        /* Two-column grid: explanation | code */
        .sol-grid {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .sol-col {
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 6px;
        }

        .sol-col-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .sol-col textarea {
            flex: 1;
            min-height: 0;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--font-ui);
            resize: none;
            line-height: 1.6;
            transition: border-color 0.15s;
        }

        .sol-col textarea.is-code {
            font-family: var(--font-mono);
            font-size: 12.5px;
            line-height: 1.65;
        }

        .sol-col textarea:focus {
            outline: none;
            border-color: var(--border2);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* TC / SC row */
        .sol-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-shrink: 0;
        }

        .sol-meta-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sol-meta-field label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .sol-meta-field input {
            padding: 8px 11px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--font-mono);
            transition: border-color 0.15s;
        }

        .sol-meta-field input:focus { outline: none; border-color: var(--border2); }

        /* Solutions footer */
        .sol-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-remove-sol {
            padding: 7px 14px;
            background: var(--red-dim);
            border: 1px solid var(--red-border);
            border-radius: 5px;
            color: var(--red);
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-remove-sol:hover { opacity: 0.8; }
        .btn-remove-sol:disabled { opacity: 0.3; pointer-events: none; }

        .btn-save {
            padding: 8px 22px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-save:hover { opacity: 0.88; }

        /* ─── LINKS MODAL ─── */
        #linksModal .modal-box {
            max-width: 460px;
        }

        .links-body {
            padding: 16px 20px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .links-empty {
            font-size: 13px;
            color: var(--text-muted);
            padding: 12px 0;
        }

        .link-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .link-row input {
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--font-ui);
            transition: border-color 0.15s;
        }

        .link-row input:focus { outline: none; border-color: var(--border2); }
        .link-row .inp-name { width: 110px; flex-shrink: 0; }
        .link-row .inp-url { flex: 1; font-family: var(--font-mono); font-size: 12px; }

        .btn-rm-link {
            width: 28px;
            height: 28px;
            background: var(--red-dim);
            border: 1px solid var(--red-border);
            border-radius: 4px;
            color: var(--red);
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-ui);
            transition: opacity 0.15s;
        }

        .btn-rm-link:hover { opacity: 0.75; }

        .links-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .btn-add-lrow {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text-dim);
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-add-lrow:hover {
            border-color: var(--blue-border);
            color: var(--blue);
            background: var(--blue-dim);
        }

        /* ─── OUT OF RANGE ─── */
        .out-range {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .out-range .label {
            font-size: 13px;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="loginScreen">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-mark">Δ</div>
            <h1>DSA Task Tracker</h1>
        </div>
        <div class="field-label">User ID</div>
        <input type="text" id="uidInput" placeholder="Enter user ID" autocomplete="off">
        <div class="field-label">Password</div>
        <input type="password" id="pwInput" placeholder="Enter password" autocomplete="off"
               onkeydown="if(event.key==='Enter') app.login()">
        <button class="btn-login" onclick="app.login()">Log In</button>
    </div>
</div>

<!-- ── APP ── -->
<div class="app-wrap" id="appWrap">
    <div class="app-inner">

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-logo">
                <div class="topbar-logo-mark">Δ</div>
                <span>DSA Task Tracker</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <button class="btn-pdf" onclick="app.generatePDF('day',this)">PDF: Day</button>
                <button class="btn-pdf" onclick="app.generatePDF('month',this)">PDF: Month</button>
                <button class="btn-pdf" onclick="app.generatePDF('year',this)">PDF: Year</button>
                <button class="btn-logout" onclick="app.logout()">Log out</button>
            </div>

        <!-- Date nav -->
        <div class="date-nav-wrap">
            <button class="btn-daynav" onclick="app.prevDay()">‹</button>
            <div class="date-center">
                <div class="date-primary" id="datePrimary"></div>
                <div class="date-pills">
                    <span class="date-pill pill-day" id="pillDay"></span>
                    <span class="date-pill pill-qs" id="pillQs"></span>
                </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <input type="date" class="date-picker" id="datePicker" onchange="app.onDatePick()">
                <button class="btn-daynav" onclick="app.nextDay()">›</button>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-row" id="progressDots"></div>

        <!-- Table -->
        <div class="table-wrap" id="tableWrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:64px;text-align:center">#</th>
                        <th>Problem</th>
                        <th style="width:260px">Links</th>
                        <th style="width:120px">Revision</th>
                        <th style="width:150px">Solutions</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- ── SOLUTIONS MODAL ── -->
<div class="modal-overlay" id="solModal">
    <div class="modal-box">
        <div class="modal-head">
            <h2 id="solModalTitle">Solutions</h2>
            <button class="btn-close" onclick="app.closeSolModal()">×</button>
        </div>
        <div class="sol-tabs" id="solTabs"></div>
        <div class="sol-body" id="solBody"></div>
        <div class="sol-foot">
            <button class="btn-remove-sol" id="btnRemoveSol" onclick="app.removeActiveSol()">Remove approach</button>
            <button class="btn-save" onclick="app.saveSol()">Save</button>
        </div>
    </div>
</div>

<!-- ── LINKS MODAL ── -->
<div class="modal-overlay" id="linksModal">
    <div class="modal-box">
        <div class="modal-head">
            <h2 id="linksModalTitle">Links</h2>
            <button class="btn-close" onclick="app.closeLinksModal()">×</button>
        </div>
        <div class="links-body" id="linksBody"></div>
        <div class="links-foot">
            <button class="btn-add-lrow" onclick="app.addLinkRow()">+ Add link</button>
            <button class="btn-save" onclick="app.saveLinks()">Save links</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyBcvmfQr49-CUO1DVq1y91jyYZbgEZOD4E",
    authDomain: "pro-dsa-tracker.firebaseapp.com",
    projectId: "pro-dsa-tracker",
    storageBucket: "pro-dsa-tracker.firebasestorage.app",
    messagingSenderId: "777367986934",
    appId: "1:777367986934:web:1d08ee8bbd66d12a6782d7"
});
const db = firebase.firestore();

// Challenge: March 26 2026 → March 26 2027 (Day 1 to Day 366)
const START = new Date(2026, 2, 26); // local time

const app = {
    userKey: null,
    date: null,           // current Date
    problems: [],         // always length 5
    activeProbId: null,   // for solutions modal
    activeSolIdx: 0,
    linksProbId: null,    // for links modal

    /* ── Auth ── */
    hash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
        return Math.abs(h).toString(36);
    },

    async login() {
        const uid = document.getElementById('uidInput').value.trim();
        const pw  = document.getElementById('pwInput').value.trim();
        if (!uid || !pw) { alert('Fill both fields'); return; }
        this.userKey = this.hash(uid + ':' + pw);
        const saved = localStorage.getItem('dsa_date');
        this.date = saved ? this.parseDate(saved) : new Date(START);
        localStorage.setItem('dsa_userKey', this.userKey);
        this.boot();
    },

    logout() {
        localStorage.removeItem('dsa_userKey');
        localStorage.removeItem('dsa_date');
        this.userKey = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appWrap').classList.remove('active');
    },

    async checkSession() {
        const k = localStorage.getItem('dsa_userKey');
        if (!k) return;
        this.userKey = k;
        const s = localStorage.getItem('dsa_date');
        this.date = s ? this.parseDate(s) : new Date(START);
        this.boot();
    },

    boot() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appWrap').classList.add('active');
        this.loadDay();
    },

    /* ── Date utils ── */
    fmtDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    },

    parseDate(s) {
        const [y, m, d] = s.split('-').map(Number);
        return new Date(y, m - 1, d);
    },

    dayIndex(d) {
        const ms = new Date(d.getFullYear(), d.getMonth(), d.getDate()) - START;
        return Math.round(ms / 86400000); // 0-indexed; Day 1 = index 0
    },

    prevDay() { this.shiftDay(-1); },
    nextDay() { this.shiftDay(+1); },
    shiftDay(n) {
        const d = new Date(this.date);
        d.setDate(d.getDate() + n);
        this.date = d;
        this.persistDate();
        this.loadDay();
    },

    onDatePick() {
        const v = document.getElementById('datePicker').value;
        if (v) { this.date = this.parseDate(v); this.persistDate(); this.loadDay(); }
    },

    persistDate() { localStorage.setItem('dsa_date', this.fmtDate(this.date)); },

    /* ── Firestore ── */
    docRef() {
        return db.collection('users').doc(this.userKey).collection('days').doc(this.fmtDate(this.date));
    },

    async loadDay() {
        try {
            const snap = await this.docRef().get();
            if (snap.exists) {
                const data = snap.data();
                this.problems = Array.isArray(data.problems) ? data.problems : this.blankDay();
                // Ensure exactly 5, preserve fixed IDs
                while (this.problems.length < 5) this.problems.push(this.blankProb(this.problems.length));
                this.problems = this.problems.slice(0, 5);
            } else {
                this.problems = this.blankDay();
            }
        } catch (e) {
            console.error(e);
            this.problems = this.blankDay();
        }
        this.updateHeader();
        this.render();
    },

    async save() {
        try {
            await this.docRef().set({
                problems: this.problems,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch (e) {
            console.error(e);
            alert('Save failed.');
        }
    },

    blankDay() { return [0,1,2,3,4].map(i => this.blankProb(i)); },
    blankProb(i) { return { id: `q${i}`, title: '', links: [], revision: 0, solutions: [] }; },

    /* ── Header ── */
    updateHeader() {
        const idx = this.dayIndex(this.date);
        const inRange = idx >= 0 && idx < 366;

        const dateStr = this.date.toLocaleDateString('en-IN', {
            weekday: 'short', day: 'numeric', month: 'long', year: 'numeric'
        });
        document.getElementById('datePrimary').textContent = dateStr;
        document.getElementById('datePicker').value = this.fmtDate(this.date);

        if (inRange) {
            const dayNum = idx + 1;
            const q1 = idx * 5 + 1, q5 = idx * 5 + 5;
            document.getElementById('pillDay').textContent = `Day ${dayNum} / 366`;
            document.getElementById('pillQs').textContent  = `Q${q1} – Q${q5}`;
        } else {
            document.getElementById('pillDay').textContent = idx < 0 ? 'Before start' : 'After end';
            document.getElementById('pillQs').textContent  = '—';
        }

        // Progress dots
        const dots = document.getElementById('progressDots');
        dots.innerHTML = '';
        this.problems.forEach(p => {
            const div = document.createElement('div');
            div.className = 'progress-dot' + (p.title && p.title.trim() ? ' done' : '');
            dots.appendChild(div);
        });
    },

    /* ── Render table ── */
    render() {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        const idx = this.dayIndex(this.date);
        const inRange = idx >= 0 && idx < 366;

        this.problems.forEach((p, i) => {
            const gNum  = inRange ? idx * 5 + i + 1 : '—';
            const hasSol = p.solutions && p.solutions.length > 0;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="q-cell">
                    <div class="q-global">${inRange ? 'Q' + gNum : '—'}</div>
                    <div class="q-local">#${i + 1}</div>
                </td>
                <td>
                    <div class="editable-cell" data-id="${p.id}" data-field="title">
                        ${p.title ? this.esc(p.title) : '<span class="title-placeholder">Untitled…</span>'}
                    </div>
                </td>
                <td>
                    <div class="links-cell" id="lc-${p.id}">
                        ${this.renderLinkChips(p)}
                        <button class="btn-add-link" onclick="app.openLinksModal('${p.id}')">
                            ${p.links && p.links.length ? '✎ edit' : '+ links'}
                        </button>
                    </div>
                </td>
                <td>
                    <div class="bubbles">${this.renderBubbles(p.id, p.revision || 0)}</div>
                </td>
                <td>
                    <button class="btn-solutions ${hasSol ? 'has-solutions' : ''}"
                            onclick="app.openSolModal('${p.id}')">
                        ${hasSol ? `Solutions (${p.solutions.length})` : 'Solutions'}
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        this.bindEditable();
    },

    renderLinkChips(p) {
        if (!p.links || !p.links.length) return '';
        return p.links.map(l =>
            `<a class="link-chip" href="${this.esc(l.url)}" target="_blank"
                onclick="event.stopPropagation()">${this.esc(l.name || 'Link')}</a>`
        ).join('');
    },

    renderBubbles(id, cur) {
        return [1,2,3,4,5].map(n =>
            `<div class="bubble ${n <= cur ? 'on' : ''}" onclick="app.setRev('${id}',${n})"></div>`
        ).join('');
    },

    esc(t) {
        if (!t) return '';
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    },

    /* ── Editable cells ── */
    bindEditable() {
        document.querySelectorAll('.editable-cell').forEach(cell => {
            cell.addEventListener('click', () => {
                if (!cell.classList.contains('editing')) this.startEdit(cell);
            });
        });
    },

    startEdit(cell) {
        const raw = this.problems.find(p => p.id === cell.dataset.id)?.[cell.dataset.field] || '';
        cell.classList.add('editing');

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = raw;
        cell.innerHTML = '';
        cell.appendChild(inp);
        inp.focus(); inp.select();

        const commit = async () => {
            const p = this.problems.find(x => x.id === cell.dataset.id);
            if (p) p[cell.dataset.field] = inp.value.trim();
            await this.save();
            this.updateHeader();
            this.render();
        };

        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); commit(); }
            if (e.key === 'Escape') this.render();
        });
        inp.addEventListener('blur', commit);
    },

    /* ── Revision ── */
    async setRev(id, n) {
        const p = this.problems.find(x => x.id === id);
        if (!p) return;
        p.revision = p.revision === n ? n - 1 : n;
        await this.save();
        this.render();
    },

    /* ── Links modal ── */
    openLinksModal(id) {
        const p = this.problems.find(x => x.id === id);
        if (!p) return;
        this.linksProbId = id;
        if (!Array.isArray(p.links)) p.links = [];

        const i = this.problems.indexOf(p);
        const idx = this.dayIndex(this.date);
        const gNum = idx >= 0 ? idx * 5 + i + 1 : '—';

        document.getElementById('linksModalTitle').innerHTML =
            `Links &mdash; <strong>Q${gNum}</strong>`;

        this.renderLinksEditor();
        document.getElementById('linksModal').classList.add('open');
    },

    renderLinksEditor() {
        const p = this.problems.find(x => x.id === this.linksProbId);
        const body = document.getElementById('linksBody');
        body.innerHTML = '';

        if (!p || !p.links.length) {
            body.innerHTML = '<div class="links-empty">No links yet — add one below.</div>';
        }

        (p ? p.links : []).forEach((l, i) => {
            const row = document.createElement('div');
            row.className = 'link-row';
            row.innerHTML = `
                <input class="inp-name" type="text" placeholder="Name" value="${this.esc(l.name)}"
                       data-i="${i}" data-f="name">
                <input class="inp-url" type="url" placeholder="https://…" value="${this.esc(l.url)}"
                       data-i="${i}" data-f="url">
                <button class="btn-rm-link" onclick="app.removeLinkRow(${i})">×</button>
            `;
            body.appendChild(row);
        });
    },

    collectLinks() {
        const p = this.problems.find(x => x.id === this.linksProbId);
        if (!p) return;
        const map = {};
        document.querySelectorAll('#linksBody input').forEach(inp => {
            const i = inp.dataset.i, f = inp.dataset.f;
            if (i !== undefined) { if (!map[i]) map[i] = {}; map[i][f] = inp.value; }
        });
        p.links = Object.values(map).map(x => ({ name: x.name || '', url: x.url || '' }));
    },

    addLinkRow() {
        const p = this.problems.find(x => x.id === this.linksProbId);
        if (!p) return;
        this.collectLinks();
        p.links.push({ name: '', url: '' });
        this.renderLinksEditor();
        // Focus last name field
        setTimeout(() => {
            const inputs = document.querySelectorAll('#linksBody .inp-name');
            if (inputs.length) inputs[inputs.length - 1].focus();
        }, 50);
    },

    removeLinkRow(i) {
        const p = this.problems.find(x => x.id === this.linksProbId);
        if (!p) return;
        this.collectLinks();
        p.links.splice(i, 1);
        this.renderLinksEditor();
    },

    async saveLinks() {
        this.collectLinks();
        await this.save();
        this.closeLinksModal();
        this.render();
    },

    closeLinksModal() {
        document.getElementById('linksModal').classList.remove('open');
        this.linksProbId = null;
    },

    /* ── Solutions modal ── */
    openSolModal(id) {
        const p = this.problems.find(x => x.id === id);
        if (!p) return;
        this.activeProbId = id;
        this.activeSolIdx = 0;
        if (!Array.isArray(p.solutions)) p.solutions = [];
        if (!p.solutions.length) p.solutions.push(this.blankSol());

        const i = this.problems.indexOf(p);
        const idx = this.dayIndex(this.date);
        const gNum = idx >= 0 ? idx * 5 + i + 1 : '—';
        document.getElementById('solModalTitle').innerHTML =
            `Solutions &mdash; <strong>Q${gNum}: ${this.esc(p.title || 'Untitled')}</strong>`;

        this.renderSolModal(p.solutions);
        document.getElementById('solModal').classList.add('open');
    },

    closeSolModal() {
        document.getElementById('solModal').classList.remove('open');
        this.activeProbId = null;
    },

    blankSol() {
        return { id: Date.now().toString(36) + Math.random().toString(36).slice(2),
                 explanation: '', code: '', tc: '', sc: '' };
    },

    renderSolModal(sols) {
        const tabs = document.getElementById('solTabs');
        const body = document.getElementById('solBody');

        // Tabs
        tabs.innerHTML = sols.map((s, i) =>
            `<div class="sol-tab ${i === this.activeSolIdx ? 'active' : ''}"
                  onclick="app.switchSol(${i})">Approach ${i + 1}</div>`
        ).join('') + `<div class="sol-tab-add" onclick="app.addSol()">+ New</div>`;

        // Panels
        body.innerHTML = sols.map((s, i) => `
            <div class="sol-panel ${i === this.activeSolIdx ? 'active' : ''}">
                <div class="sol-grid">
                    <div class="sol-col">
                        <div class="sol-col-label">Explanation / Intuition</div>
                        <textarea data-sid="${s.id}" data-f="explanation">${this.esc(s.explanation || '')}</textarea>
                    </div>
                    <div class="sol-col">
                        <div class="sol-col-label">Code</div>
                        <textarea class="is-code" data-sid="${s.id}" data-f="code">${this.esc(s.code || '')}</textarea>
                    </div>
                </div>
                <div class="sol-meta">
                    <div class="sol-meta-field">
                        <label>Time Complexity</label>
                        <input type="text" data-sid="${s.id}" data-f="tc"
                               value="${this.esc(s.tc || '')}" placeholder="e.g. O(n log n)">
                    </div>
                    <div class="sol-meta-field">
                        <label>Space Complexity</label>
                        <input type="text" data-sid="${s.id}" data-f="sc"
                               value="${this.esc(s.sc || '')}" placeholder="e.g. O(n)">
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('btnRemoveSol').disabled = sols.length <= 1;
    },

    switchSol(i) {
        const p = this.problems.find(x => x.id === this.activeProbId);
        if (!p) return;
        this.collectSolDOM();
        this.activeSolIdx = i;
        this.renderSolModal(p.solutions);
    },

    addSol() {
        const p = this.problems.find(x => x.id === this.activeProbId);
        if (!p) return;
        this.collectSolDOM();
        p.solutions.push(this.blankSol());
        this.activeSolIdx = p.solutions.length - 1;
        this.renderSolModal(p.solutions);
    },

    removeActiveSol() {
        const p = this.problems.find(x => x.id === this.activeProbId);
        if (!p || p.solutions.length <= 1) return;
        this.collectSolDOM();
        p.solutions.splice(this.activeSolIdx, 1);
        this.activeSolIdx = Math.max(0, this.activeSolIdx - 1);
        this.renderSolModal(p.solutions);
    },

    collectSolDOM() {
        const p = this.problems.find(x => x.id === this.activeProbId);
        if (!p) return;
        document.querySelectorAll('#solBody [data-sid]').forEach(el => {
            const sol = p.solutions.find(s => s.id === el.dataset.sid);
            if (sol) sol[el.dataset.f] = el.value;
        });
    },

    async saveSol() {
        this.collectSolDOM();
        await this.save();
        this.closeSolModal();
        this.render();
    },

    /* ── PDF ── */
    fmtDateLong(d) {
        return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
    },

    async collectDataForScope(scope) {
        const days = [];
        if (scope === 'day') {
            const idx = this.dayIndex(this.date);
            if (idx >= 0 && idx < 366) {
                days.push({
                    date: this.date,
                    dayIdx: idx,
                    label: `Day ${idx + 1} — ${this.fmtDateLong(this.date)}`,
                    qStart: idx * 5 + 1,
                    problems: JSON.parse(JSON.stringify(this.problems))
                });
            }
        } else {
            const y = this.date.getFullYear();
            const m = this.date.getMonth();
            let startStr, endStr;
            if (scope === 'month') {
                const mStr = String(m + 1).padStart(2, '0');
                startStr = `${y}-${mStr}-01`;
                endStr   = `${y}-${mStr}-31`;
            } else {
                startStr = `${y}-01-01`;
                endStr   = `${y}-12-31`;
            }
            const snap = await db.collection('users').doc(this.userKey)
                .collection('days')
                .where(firebase.firestore.FieldPath.documentId(), '>=', startStr)
                .where(firebase.firestore.FieldPath.documentId(), '<=', endStr)
                .get();
            snap.forEach(docSnap => {
                const date = this.parseDate(docSnap.id);
                const idx = this.dayIndex(date);
                if (idx < 0 || idx >= 366) return;
                const data = docSnap.data();
                let probs = Array.isArray(data.problems) ? data.problems.slice(0, 5) : [];
                while (probs.length < 5) probs.push(this.blankProb(probs.length));
                days.push({
                    date,
                    dayIdx: idx,
                    label: `Day ${idx + 1} — ${this.fmtDateLong(date)}`,
                    qStart: idx * 5 + 1,
                    problems: probs
                });
            });
            days.sort((a, b) => a.dayIdx - b.dayIdx);
        }
        return days;
    },

    // Renders content pages. draw=false = dry run (font metrics only, no drawing).
    // Returns pageMap: { qNum -> absolutePage }
    doRenderContent(doc, days, tocOffset, draw) {
        const PW = 595.28, PH = 841.89;
        const ML = 50, MR = 50, MT = 55, MB = 55;
        const CW = PW - ML - MR;
        let pg = 1, y = MT;
        const pageMap = {};
        const multiDay = days.length > 1;

        const newPage = () => { if (draw) doc.addPage(); pg++; y = MT; };
        const checkY  = (need) => { if (y + need > PH - MB) newPage(); };

        for (const day of days) {
            if (multiDay) {
                checkY(40);
                doc.setFontSize(11); doc.setFont('helvetica', 'bold');
                if (draw) {
                    doc.setFillColor(240, 245, 255);
                    doc.rect(ML - 5, y - 13, CW + 10, 22, 'F');
                    doc.setTextColor(40, 60, 120);
                    doc.text(day.label, ML, y);
                }
                y += 22;
            }

            for (let pi = 0; pi < day.problems.length; pi++) {
                const prob = day.problems[pi];
                const qNum = day.qStart + pi;

                checkY(55);
                pageMap[qNum] = pg + tocOffset;

                // Question title
                doc.setFontSize(13); doc.setFont('helvetica', 'bold');
                if (draw) { doc.setTextColor(10, 110, 55); doc.text(`Q${qNum}: ${prob.title || '(Untitled)'}`, ML, y); }
                y += 20;

                // Links row
                if (prob.links && prob.links.length > 0) {
                    checkY(18);
                    doc.setFontSize(9); doc.setFont('helvetica', 'bold');
                    if (draw) { doc.setTextColor(120, 120, 120); doc.text('LINKS:', ML, y); }
                    let lx = ML + 42;
                    for (const lnk of prob.links) {
                        if (!lnk.url) continue;
                        const lname = lnk.name || 'Link';
                        doc.setFontSize(9); doc.setFont('helvetica', 'normal');
                        const tw = doc.getTextWidth(lname);
                        if (lx + tw > PW - MR - 10) { lx = ML + 42; y += 14; checkY(14); }
                        if (draw) {
                            doc.setTextColor(30, 100, 200);
                            doc.textWithLink(lname, lx, y, { url: lnk.url });
                        }
                        lx += tw + 14;
                    }
                    y += 16;
                }

                // Revision
                if (prob.revision && prob.revision > 0) {
                    checkY(16);
                    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
                    if (draw) { doc.setTextColor(120, 120, 120); doc.text(`Revision: ${prob.revision}/5`, ML, y); }
                    y += 15;
                }

                // Solutions
                if (prob.solutions && prob.solutions.length > 0) {
                    for (let si = 0; si < prob.solutions.length; si++) {
                        const sol = prob.solutions[si];
                        if (!sol) continue;
                        checkY(28);

                        // Approach header
                        doc.setFontSize(10); doc.setFont('helvetica', 'bold');
                        const meta = [sol.tc ? `TC: ${sol.tc}` : null, sol.sc ? `SC: ${sol.sc}` : null].filter(Boolean).join('  •  ');
                        const approachLabel = `Approach ${si + 1}${meta ? '   —   ' + meta : ''}`;
                        if (draw) { doc.setTextColor(40, 40, 40); doc.text(approachLabel, ML, y); }
                        y += 16;

                        // Explanation
                        if (sol.explanation && sol.explanation.trim()) {
                            doc.setFontSize(9.5); doc.setFont('helvetica', 'normal');
                            const lines = doc.splitTextToSize(sol.explanation.trim(), CW - 12);
                            for (const line of lines) {
                                checkY(13);
                                if (draw) { doc.setTextColor(60, 60, 60); doc.text(line, ML + 8, y); }
                                y += 12;
                            }
                            y += 5;
                        }

                        // Code block
                        if (sol.code && sol.code.trim()) {
                            doc.setFontSize(8.5); doc.setFont('courier', 'normal');
                            const clines = doc.splitTextToSize(sol.code.trim(), CW - 24);
                            const blockH = clines.length * 11 + 14;
                            checkY(Math.min(blockH, 160));

                            if (draw) {
                                doc.setFillColor(246, 246, 246);
                                doc.roundedRect(ML, y - 8, CW, Math.min(blockH, PH - MB - y + 8), 3, 3, 'F');
                            }
                            for (const cl of clines) {
                                if (y + 11 > PH - MB) newPage();
                                if (draw) { doc.setTextColor(30, 30, 30); doc.text(cl, ML + 8, y); }
                                y += 11;
                            }
                            y += 10;
                        }

                        y += 4;
                    }
                }

                // Divider
                checkY(14);
                if (draw) { doc.setDrawColor(225, 225, 225); doc.line(ML, y, PW - MR, y); }
                y += 14;
            }

            if (multiDay) y += 8;
        }

        return pageMap;
    },

    renderTOC(doc, days, pageMap, tocPages, scope) {
        const PW = 595.28, PH = 841.89;
        const ML = 50, MR = 50, MT = 55, MB = 55;
        const CW = PW - ML - MR;
        let pg = 1, y = MT;
        const multiDay = days.length > 1;

        const newPage = () => { doc.addPage(); pg++; y = MT; };
        const checkY  = (need) => { if (y + need > PH - MB) newPage(); };

        // Header
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(20, 20, 20);
        const heading = scope === 'day'
            ? `DSA Tracker — ${this.fmtDateLong(this.date)}`
            : scope === 'month'
            ? `DSA Tracker — ${this.date.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}`
            : `DSA Tracker — Year ${this.date.getFullYear()}`;
        doc.text(heading, ML, y); y += 10;
        doc.setDrawColor(200, 200, 200);
        doc.line(ML, y, PW - MR, y); y += 18;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.setTextColor(60, 60, 60);
        doc.text('Table of Contents', ML, y); y += 22;

        // Entries
        for (const day of days) {
            if (multiDay) {
                checkY(22);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                doc.setTextColor(50, 90, 160);
                doc.text(day.label.toUpperCase(), ML, y); y += 16;
            }

            for (let pi = 0; pi < day.problems.length; pi++) {
                const prob = day.problems[pi];
                const qNum = day.qStart + pi;
                const absPage = pageMap[qNum];

                checkY(15);

                // Q number (green)
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                doc.setTextColor(10, 110, 55);
                const qLabel = `Q${qNum}`;
                doc.text(qLabel, ML, y);
                const qLabelW = doc.getTextWidth(qLabel) + 8;

                // Page number (right-aligned)
                const pgText = absPage ? String(absPage) : '—';
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                doc.setTextColor(60, 60, 60);
                const pgW = doc.getTextWidth(pgText);
                doc.text(pgText, PW - MR - pgW, y);

                // Title (truncated)
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(40, 40, 40);
                const maxTitleW = CW - qLabelW - pgW - 22;
                let titleText = prob.title || '(Untitled)';
                while (doc.getTextWidth(titleText) > maxTitleW && titleText.length > 2) {
                    titleText = titleText.slice(0, -1);
                }
                if (titleText !== (prob.title || '(Untitled)')) titleText += '…';
                doc.text(titleText, ML + qLabelW, y);

                // Dot leaders
                doc.setTextColor(190, 190, 190);
                doc.setFontSize(8);
                let dx = ML + qLabelW + doc.getTextWidth(titleText) + 4;
                const dotsEnd = PW - MR - pgW - 8;
                while (dx + 4 < dotsEnd) { doc.text('.', dx, y); dx += 4; }

                // Clickable internal link for whole row
                if (absPage) {
                    doc.link(ML, y - 10, CW, 13, { pageNumber: absPage });
                }

                y += 15;
            }

            if (multiDay) y += 5;
        }

        // Pad to exactly tocPages
        while (pg < tocPages) { doc.addPage(); pg++; }
    },

    async generatePDF(scope, btn) {
        if (!window.jspdf) {
            alert('PDF library is still loading. Please wait a moment and try again.');
            return;
        }
        const origText = btn.textContent;
        btn.textContent = 'Generating…';
        btn.disabled = true;
        try {
            const { jsPDF } = window.jspdf;

            // 1. Collect data
            const days = await this.collectDataForScope(scope);
            if (!days.length) { alert('No data found for this period.'); return; }

            // 2. Dry run to get relative page numbers (font metrics applied, no drawing)
            const tempDoc = new jsPDF({ unit: 'pt', format: 'a4' });
            const relPageMap = this.doRenderContent(tempDoc, days, 0, false);

            // 3. Estimate TOC page count
            const nQuestions  = Object.keys(relPageMap).length;
            const nDayHeaders = days.length > 1 ? days.length : 0;
            const tocLines    = 6 + nDayHeaders * 2 + nQuestions;
            const tocPageCount = Math.max(1, Math.ceil(tocLines / 43));

            // 4. Shift page map by tocPageCount
            const absPageMap = {};
            for (const [q, p] of Object.entries(relPageMap)) {
                absPageMap[Number(q)] = Number(p) + tocPageCount;
            }

            // 5. Build final PDF
            const doc = new jsPDF({ unit: 'pt', format: 'a4' });
            this.renderTOC(doc, days, absPageMap, tocPageCount, scope);
            doc.addPage(); // first content page = tocPageCount + 1
            this.doRenderContent(doc, days, tocPageCount, true);

            // 6. Add page numbers to every page
            const totalPages = doc.getNumberOfPages();
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            for (let p = 1; p <= totalPages; p++) {
                doc.setPage(p);
                doc.setTextColor(160, 160, 160);
                doc.text(`${p} / ${totalPages}`, 595.28 - 50, 841.89 - 22, { align: 'right' });
            }

            // 7. Save
            const fname = scope === 'day'
                ? `DSA_Day_${this.fmtDate(this.date)}`
                : scope === 'month'
                ? `DSA_Month_${this.date.getFullYear()}-${String(this.date.getMonth() + 1).padStart(2, '0')}`
                : `DSA_Year_${this.date.getFullYear()}`;
            doc.save(`${fname}.pdf`);
        } catch (err) {
            console.error(err);
            alert('Failed to generate PDF: ' + err.message);
        } finally {
            btn.textContent = origText;
            btn.disabled = false;
        }
    }
};

// Keyboard shortcuts
window.addEventListener('keydown', e => {
    if (e.key === 'Escape') { app.closeSolModal(); app.closeLinksModal(); }
});

window.addEventListener('DOMContentLoaded', () => app.checkSession());
</script>
