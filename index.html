<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- jsPDF and html2canvas for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #111116;
            --surface2: #18181e;
            --border: #25252e;
            --border-hover: #3a3a48;
            --text: #e8e8ed;
            --text-dim: #6e6e7a;
            --text-muted: #44444f;
            --accent: #c9a0ff;
            --accent-dim: #7b5ea7;
            --accent-glow: rgba(201, 160, 255, 0.08);
            --done: #5ae4a7;
            --done-dim: #2a7a52;
            --danger: #ff6b7a;
            --radius: 10px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: -40%; left: -20%;
            width: 80%; height: 80%;
            background: radial-gradient(ellipse, rgba(201,160,255,0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; bottom: -30%; right: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(90,228,167,0.03) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── Login ── */
        .login-screen {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; background: var(--bg);
            animation: fadeIn 0.4s ease;
        }
        .login-screen.hidden { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 400px; max-width: 92vw;
            animation: slideUp 0.5s ease 0.1s both;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute; inset: -1px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(201,160,255,0.15), transparent 50%, rgba(90,228,167,0.1));
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; padding: 1px;
        }

        .login-brand {
            font-family: 'Instrument Serif', serif;
            font-size: 36px; text-align: center;
            margin-bottom: 4px; letter-spacing: -0.5px;
        }
        .login-brand span { color: var(--accent); font-style: italic; }
        .login-subtitle {
            text-align: center; color: var(--text-dim);
            font-size: 13px; margin-bottom: 36px; letter-spacing: 0.3px;
        }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-dim);
            margin-bottom: 8px; font-weight: 500;
        }
        .form-input {
            width: 100%; background: var(--bg);
            border: 1px solid var(--border); color: var(--text);
            padding: 12px 16px; border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        .form-input:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-input::placeholder { color: var(--text-muted); }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-dim), #9b6dd7);
            border: none; color: #fff; padding: 13px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 700;
            letter-spacing: 0.5px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(201,160,255,0.2);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            opacity: 0.6; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .login-error {
            color: var(--danger); font-size: 12px;
            text-align: center; margin-top: 12px; min-height: 18px;
        }
        .login-success {
            color: var(--done); font-size: 12px;
            text-align: center; margin-top: 12px; min-height: 18px;
        }
        .login-toggle {
            text-align: center; margin-top: 20px;
            font-size: 13px; color: var(--text-dim);
        }
        .login-toggle a {
            color: var(--accent); cursor: pointer;
            text-decoration: none; font-weight: 500;
        }
        .login-toggle a:hover { text-decoration: underline; }

        /* ── App ── */
        .app { display: none; position: relative; z-index: 1; }
        .app.active { display: block; }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

        .topbar {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .brand {
            font-family: 'Instrument Serif', serif;
            font-size: 26px; letter-spacing: -0.3px; user-select: none;
        }
        .brand span { color: var(--accent); font-style: italic; }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 6px 16px;
            font-size: 13px; color: var(--text-dim);
            display: flex; align-items: center; gap: 6px;
        }
        .user-badge .dot {
            width: 6px; height: 6px;
            background: var(--done); border-radius: 50%;
        }
        .logout-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 6px 14px;
            border-radius: 20px; font-family: 'DM Sans', sans-serif;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Date Nav ── */
        .date-nav {
            display: flex; align-items: center;
            justify-content: space-between; gap: 12px;
            margin-bottom: 28px; flex-wrap: wrap;
        }
        .date-controls { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); width: 36px; height: 36px;
            border-radius: var(--radius); cursor: pointer;
            font-size: 16px; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s;
        }
        .nav-btn:hover { background: var(--surface2); border-color: var(--border-hover); }

        .current-date {
            font-family: 'Instrument Serif', serif;
            font-size: 22px; min-width: 200px;
            text-align: center; letter-spacing: -0.3px;
        }

        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 16px;
            border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
            font-size: 13px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }
        .action-btn.primary {
            background: var(--accent-glow);
            border-color: var(--accent-dim); color: var(--accent);
        }
        .action-btn.primary:hover { background: rgba(201,160,255,0.14); }

        .hidden-date-input { position: absolute; opacity: 0; pointer-events: none; }

        /* ── Cards ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        @media (max-width: 700px) {
            .cards-grid { grid-template-columns: 1fr; }
            .current-date { min-width: auto; font-size: 18px; }
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            animation: slideUp 0.3s ease both;
        }
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .card-head {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 14px; gap: 8px;
        }
        .card-title-input {
            background: transparent; border: none;
            color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 700; flex: 1;
            padding: 4px 0; outline: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .card-title-input:focus { border-bottom-color: var(--accent-dim); }
        .card-title-input::placeholder { color: var(--text-muted); }

        .card-count {
            font-size: 11px; color: var(--text-muted);
            background: var(--bg); padding: 2px 8px;
            border-radius: 10px; flex-shrink: 0;
        }

        .icon-btn {
            background: transparent; border: none;
            color: var(--text-muted); width: 28px; height: 28px;
            border-radius: 6px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--surface2); color: var(--text-dim); }
        .icon-btn.danger:hover { color: var(--danger); }

        .tasks-list { display: flex; flex-direction: column; gap: 6px; }

        .task-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 8px; transition: background 0.15s;
        }
        .task-row:hover { background: rgba(255,255,255,0.02); }

        .priority-num {
            font-size: 11px; color: var(--text-muted);
            background: var(--surface2); padding: 2px 6px;
            border-radius: 4px; flex-shrink: 0;
            min-width: 20px; text-align: center;
        }

        .task-row.dragging { opacity: 0.5; }
        .task-row.drag-over { background: rgba(201,160,255,0.2); border-radius: 6px; }

        .custom-check { position: relative; width: 18px; height: 18px; flex-shrink: 0; }
        .custom-check input {
            position: absolute; opacity: 0;
            width: 100%; height: 100%; cursor: pointer; z-index: 1;
        }
        .custom-check .check-visual {
            width: 18px; height: 18px;
            border: 1.5px solid var(--border-hover);
            border-radius: 5px; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 11px; color: transparent;
        }
        .custom-check input:checked + .check-visual {
            background: var(--done-dim);
            border-color: var(--done); color: #fff;
        }

        .task-text-input {
            background: transparent; border: none;
            color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 13px; flex: 1; padding: 2px 0;
            outline: none; transition: color 0.2s;
        }
        .task-text-input::placeholder { color: var(--text-muted); }
        .task-row.completed .task-text-input { color: var(--text-muted); }

        .add-task-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; margin-top: 4px;
            border-radius: 8px; cursor: pointer;
            color: var(--text-muted); font-size: 13px; transition: all 0.15s;
        }
        .add-task-row:hover { background: rgba(255,255,255,0.02); color: var(--text-dim); }
        .add-task-row .plus {
            width: 18px; height: 18px;
            border: 1.5px dashed var(--border-hover);
            border-radius: 5px; display: flex;
            align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
        }

        .timer-section {
            margin-top: 8px; padding: 8px 10px;
            background: var(--bg); border-radius: 6px;
            font-size: 12px; color: var(--text-muted);
        }
        .timer-display {
            font-family: 'DM Sans', monospace;
            color: var(--accent); font-weight: 500;
            margin-bottom: 6px;
        }
        .timer-btns { display: flex; gap: 6px; }
        .timer-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-dim); padding: 4px 10px;
            border-radius: 4px; font-size: 11px; cursor: pointer;
            transition: all 0.15s; flex: 1;
        }
        .timer-btn:hover { border-color: var(--border-hover); color: var(--text); }
        .timer-btn.running { background: rgba(201,160,255,0.2); color: var(--accent); border-color: var(--accent-dim); }
        .sessions-list {
            margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted);
        }
        .session-item {
            display: flex; justify-content: space-between;
            padding: 3px 0;
        }

        .empty-state {
            grid-column: 1 / -1; text-align: center;
            padding: 60px 20px; color: var(--text-muted);
        }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        /* ── Loading / Toast ── */
        .loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; transition: opacity 0.3s;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 10px 18px;
            font-size: 13px; color: var(--text-dim); z-index: 300;
            transform: translateY(80px); opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .syncing-indicator {
            position: fixed; top: 12px; right: 12px;
            font-size: 11px; color: var(--text-muted);
            display: none; align-items: center; gap: 6px; z-index: 50;
        }
        .syncing-indicator.active { display: flex; }
        .syncing-indicator .mini-spinner {
            width: 12px; height: 12px;
            border: 1.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>
<div class="syncing-indicator" id="syncIndicator"><div class="mini-spinner"></div> Saving...</div>

<!-- ══════ LOGIN ══════ -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-brand">Task<span>flow</span></div>
        <p class="login-subtitle">Your tasks, everywhere.</p>

        <div id="loginForm">

            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input class="form-input" type="password" id="regPass2" placeholder="Confirm password" autocomplete="new-password">
            </div>
            <button class="login-btn" id="registerBtn">Create Account</button>
            <p class="login-error" id="regError"></p>
            <p class="login-success" id="regSuccess"></p>
            <p class="login-toggle">Have an account? <a id="showLogin">Sign in</a></p>
        </div>
    </div>
</div>

<!-- ══════ APP ══════ -->
<div class="app" id="app">
    <div class="container">
        <div class="topbar">
            <div class="brand">Task<span>flow</span></div>
            <div class="user-info">
                <div class="user-badge"><span class="dot"></span> <span id="displayUser"></span></div>
                <button class="action-btn" id="diaryBtn" style="font-size:12px; padding:6px 10px;">Diary</button>
                <button class="logout-btn" id="logoutBtn">Sign out</button>

        <div class="date-nav">
            <div class="date-controls">

                <input type="date" id="datePicker" class="hidden-date-input">

        <div class="cards-grid" id="cardsContainer"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG — Replace these with your Supabase project values
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://dfghvpvzhbruzfvpodda.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZ2h2cHZ6aGJydXpmdnBvZGRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTk0MDQsImV4cCI6MjA4ODM3NTQwNH0.pWOZWUmADwkJ6MZ3rpgi5o7DRi3I3YQiCAtMxi-lriE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let currentUser = null;
let currentDate = new Date();
let cards = [];      // [{id, title, position, tasks: [{id, text, completed, position, time_sessions: [{start, duration}]}]}]
let debounceTimers = {};
let runningTimers = {}; // {taskId: {intervalId, startTime}}
let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');

function saveQueue() {
    localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
}

async function flushQueue() {
    if (!navigator.onLine || offlineQueue.length === 0) return;
    const pending = [...offlineQueue];
    offlineQueue = [];
    saveQueue();
    for (const op of pending) {
        try {
            if (op.type === 'update') {
                await sb.from(op.table).update(op.data).eq('id', op.id);
            } else if (op.type === 'insert') {
                await sb.from(op.table).insert(op.data);
            } else if (op.type === 'delete') {
                await sb.from(op.table).delete().eq('id', op.id);
            }
        } catch (e) {
            offlineQueue.unshift(op); // put back on failure
            saveQueue();
            break;
        }
    }
    if (offlineQueue.length === 0 && pending.length > 0) showToast('Synced offline changes');
}

async function dbUpdate(table, id, data) {
    if (!navigator.onLine) {
        offlineQueue.push({ type: 'update', table, id, data });
        saveQueue();
        return;
    }
    showSyncing(true);
    await sb.from(table).update(data).eq('id', id);
    showSyncing(false);
}

window.addEventListener('online', () => {
    showToast('Back online — syncing...');
    flushQueue();
});

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function getDateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}
function showSyncing(on) {
    document.getElementById('syncIndicator').classList.toggle('active', on);
}

// ═══════════════════════════════════════════
// Supabase Data Layer
// ═══════════════════════════════════════════
async function fetchCards() {
    const dateKey = getDateKey(currentDate);
    const { data: cardRows, error: cErr } = await sb
        .from('cards')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('date', dateKey)
        .order('position');

    if (cErr) { console.error('Fetch cards error:', cErr); return; }

    if (cardRows.length === 0) { cards = []; return; }

    const cardIds = cardRows.map(c => c.id);
    const { data: taskRows, error: tErr } = await sb
        .from('tasks')
        .select('*')
        .in('card_id', cardIds)
        .order('position');

    if (tErr) { console.error('Fetch tasks error:', tErr); return; }

    cards = cardRows.map(c => ({
        ...c,
        tasks: (taskRows || []).filter(t => t.card_id === c.id).map(t => ({
            ...t,
            time_sessions: t.time_sessions || []
        }))
    }));
}

async function createCard() {
    const dateKey = getDateKey(currentDate);
    showSyncing(true);
    const { data, error } = await sb
        .from('cards')
        .insert({ user_id: currentUser.id, date: dateKey, title: 'New Card', position: cards.length })
        .select()
        .single();
    showSyncing(false);
    if (error) { console.error(error); showToast('Error creating card'); return; }
    data.tasks = [];
    cards.push(data);
    // Add card to DOM without full re-render
    appendCard(data);
}

async function deleteCard(cardId) {
    showSyncing(true);
    await sb.from('cards').delete().eq('id', cardId);
    showSyncing(false);
    cards = cards.filter(c => c.id !== cardId);
    renderCards();
}

function updateCardTitle(cardId, title) {
    const card = cards.find(c => c.id === cardId);
    if (card) card.title = title;
    debounce(`card-${cardId}`, () => dbUpdate('cards', cardId, { title }), 500);
}

async function createTask(cardId) {
    const card = cards.find(c => c.id === cardId);
    if (!card) return;
    showSyncing(true);
    const { data, error } = await sb
        .from('tasks')
        .insert({ card_id: cardId, user_id: currentUser.id, text: '', completed: false, position: card.tasks.length })
        .select()
        .single();
    showSyncing(false);
    if (error) { console.error(error); showToast('Error creating task'); return; }
    data.time_sessions = [];
    card.tasks.push(data);
    // Add task to DOM without full re-render
    appendTask(card, data, card.tasks.length - 1);
    // Focus new task
    setTimeout(() => {
        const inputs = document.querySelectorAll(`[data-card-id="${cardId}"] .task-text-input`);
        const last = inputs[inputs.length - 1];
        if (last) last.focus();
    }, 50);
}

async function deleteTask(cardId, taskId) {
    showSyncing(true);
    await sb.from('tasks').delete().eq('id', taskId);
    showSyncing(false);
    const card = cards.find(c => c.id === cardId);
    if (card) card.tasks = card.tasks.filter(t => t.id !== taskId);
    renderCards();
}

function updateTaskText(cardId, taskId, text) {
    const card = cards.find(c => c.id === cardId);
    if (card) {
        const task = card.tasks.find(t => t.id === taskId);
        if (task) task.text = text;
    }
    debounce(`task-text-${taskId}`, () => dbUpdate('tasks', taskId, { text }), 500);
}

async function toggleTask(cardId, taskId, completed) {
    const card = cards.find(c => c.id === cardId);
    if (card) {
        const task = card.tasks.find(t => t.id === taskId);
        if (task) task.completed = completed;
    }
    
    // Update DOM
    const taskRow = document.querySelector(`[data-task-id="${taskId}"]`);
    if (taskRow) {
        taskRow.classList.toggle('completed', completed);
    }
    
    // Update card count
    const card_el = document.querySelector(`.card[data-card-id="${cardId}"]`);
    if (card_el && card) {
        const total = card.tasks.length;
        const done = card.tasks.filter(t => t.completed).length;
        card_el.querySelector('.card-count').textContent = `${done}/${total}`;
    }

    await dbUpdate('tasks', taskId, { completed });
}

function debounce(key, fn, ms) {
    clearTimeout(debounceTimers[key]);
    debounceTimers[key] = setTimeout(fn, ms);
}

function persistRunningTimers() {
    const toSave = {};
    for (const [taskId, timer] of Object.entries(runningTimers)) {
        toSave[taskId] = { startTime: timer.startTime, cardId: timer.cardId };
    }
    localStorage.setItem('runningTimers', JSON.stringify(toSave));
}

function startTimer(cardId, taskId, displayDiv, startBtn, existingStartTime) {
    const card = cards.find(c => c.id === cardId);
    const task = card?.tasks.find(t => t.id === taskId);
    if (!task) return;

    const startTime = existingStartTime || Date.now();

    const intervalId = setInterval(() => {
        const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        displayDiv.textContent = `Timer: ${formatTime(elapsedSeconds)}`;
    }, 100);

    runningTimers[taskId] = { intervalId, startTime, cardId };
    persistRunningTimers();
    startBtn.textContent = '⏸ Stop';
    startBtn.classList.add('running');
}

function stopTimer(cardId, taskId) {
    const timer = runningTimers[taskId];
    if (!timer) return;

    clearInterval(timer.intervalId);
    const elapsedSeconds = Math.floor((Date.now() - timer.startTime) / 1000);
    delete runningTimers[taskId];
    persistRunningTimers();

    const card = cards.find(c => c.id === cardId);
    const task = card?.tasks.find(t => t.id === taskId);
    if (!task) return;

    // Add session
    if (!task.time_sessions) task.time_sessions = [];
    task.time_sessions.push({ duration: elapsedSeconds });

    // Update UI
    const timerSection = document.querySelector(`.timer-section[data-task-id="${taskId}"]`);
    if (timerSection) {
        timerSection.remove();
    }

    const taskRow = document.querySelector(`[data-task-id="${taskId}"]`);
    if (taskRow) {
        const timerUI = createTimerUI(card, task);
        taskRow.parentNode.insertBefore(timerUI, taskRow.nextSibling);
    }

    // Save to database
    dbUpdate('tasks', taskId, { time_sessions: task.time_sessions });
}

async function moveTask(fromCardId, taskId, toCardId, beforeTaskId) {
    const fromCard = cards.find(c => c.id === fromCardId);
    const toCard = cards.find(c => c.id === toCardId);

    if (!fromCard || !toCard) return;

    const task = fromCard.tasks.find(t => t.id === taskId);
    if (!task) return;

    // Remove from old card
    fromCard.tasks = fromCard.tasks.filter(t => t.id !== taskId);

    // Find insertion position
    const targetIndex = toCard.tasks.findIndex(t => t.id === beforeTaskId);
    const insertIndex = targetIndex >= 0 ? targetIndex : toCard.tasks.length;

    // Add to new card
    toCard.tasks.splice(insertIndex, 0, task);

    // Update positions in database
    showSyncing(true);
    await sb.from('tasks').update({ card_id: toCardId, position: insertIndex }).eq('id', taskId);
    
    // Update positions of other tasks in the new card
    const updatePromises = toCard.tasks.map((t, idx) =>
        sb.from('tasks').update({ position: idx }).eq('id', t.id)
    );
    await Promise.all(updatePromises);

    showSyncing(false);

    // Update counts
    updateCardCount(fromCardId);
    updateCardCount(toCardId);

    // Re-render both cards' tasks
    renderTasksInCard(fromCardId);
    renderTasksInCard(toCardId);
}

function updateCardCount(cardId) {
    const card = cards.find(c => c.id === cardId);
    const card_el = document.querySelector(`.card[data-card-id="${cardId}"]`);
    if (card_el && card) {
        const total = card.tasks.length;
        const done = card.tasks.filter(t => t.completed).length;
        card_el.querySelector('.card-count').textContent = `${done}/${total}`;
    }
}

function renderTasksInCard(cardId) {
    const card = cards.find(c => c.id === cardId);
    if (!card) return;

    const tasksList = document.querySelector(`.tasks-list[data-card-id="${cardId}"]`);
    if (!tasksList) return;

    // Clear existing tasks
    const taskRows = tasksList.querySelectorAll('.task-row');
    const timerSections = tasksList.querySelectorAll('.timer-section');
    taskRows.forEach(row => row.remove());
    timerSections.forEach(timer => timer.remove());

    // Re-append all tasks
    card.tasks.forEach((task, idx) => {
        const taskRow = createTaskElement(card, task, idx);
        tasksList.appendChild(taskRow);
        const timerUI = createTimerUI(card, task);
        tasksList.appendChild(timerUI);
    });
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════

function formatTime(seconds) {
    const hrs = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    if (hrs > 0) return `${hrs}h ${mins}m`;
    if (mins > 0) return `${mins}m ${secs}s`;
    return `${secs}s`;
}

function getTotalSessionTime(timeSessions) {
    if (!timeSessions || !Array.isArray(timeSessions)) return 0;
    return timeSessions.reduce((sum, session) => sum + (session.duration || 0), 0);
}

function createTaskElement(card, task, taskIndex) {
    const totalTime = getTotalSessionTime(task.time_sessions);
    const taskEl = document.createElement('div');
    taskEl.className = `task-row ${task.completed ? 'completed' : ''}`;
    taskEl.dataset.taskId = task.id;
    taskEl.draggable = true;
    taskEl.innerHTML = `
        <label class="custom-check">
            <input type="checkbox" ${task.completed ? 'checked' : ''}>
            <span class="check-visual">&#10003;</span>
        </label>
        <span class="priority-num">${taskIndex + 1}</span>
        <input class="task-text-input" value="${esc(task.text)}" placeholder="Task...">
        <button class="icon-btn danger remove-task-btn" title="Remove">&times;</button>
    `;

    const checkbox = taskEl.querySelector('input[type="checkbox"]');
    checkbox.addEventListener('change', () => toggleTask(card.id, task.id, checkbox.checked));

    const textInp = taskEl.querySelector('.task-text-input');
    textInp.addEventListener('input', () => updateTaskText(card.id, task.id, textInp.value));

    taskEl.querySelector('.remove-task-btn').addEventListener('click', () => deleteTask(card.id, task.id));

    // Drag and drop
    taskEl.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('taskInfo', JSON.stringify({ cardId: card.id, taskId: task.id }));
        taskEl.classList.add('dragging');
    });

    taskEl.addEventListener('dragend', () => {
        taskEl.classList.remove('dragging');
        document.querySelectorAll('.task-row').forEach(t => t.classList.remove('drag-over'));
    });

    taskEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!taskEl.classList.contains('dragging')) {
            taskEl.classList.add('drag-over');
        }
    });

    taskEl.addEventListener('dragleave', () => {
        taskEl.classList.remove('drag-over');
    });

    taskEl.addEventListener('drop', async (e) => {
        e.preventDefault();
        taskEl.classList.remove('drag-over');
        const taskInfo = JSON.parse(e.dataTransfer.getData('taskInfo'));
        await moveTask(taskInfo.cardId, taskInfo.taskId, card.id, task.id);
    });

    return taskEl;
}

function createTimerUI(card, task) {
    const timerDiv = document.createElement('div');
    timerDiv.className = 'timer-section';
    timerDiv.dataset.taskId = task.id;

    const totalTime = getTotalSessionTime(task.time_sessions);
    const isRunning = runningTimers[task.id] !== undefined;

    const displayDiv = document.createElement('div');
    displayDiv.className = 'timer-display';
    displayDiv.textContent = `Total: ${formatTime(totalTime)}`;

    const btnContainer = document.createElement('div');
    btnContainer.className = 'timer-btns';

    const startBtn = document.createElement('button');
    startBtn.className = `timer-btn ${isRunning ? 'running' : ''}`;
    startBtn.textContent = isRunning ? '⏸ Stop' : '⏱ Start';
    startBtn.addEventListener('click', () => {
        if (task.completed) {
            showToast('Task is already complete');
            return;
        }
        if (runningTimers[task.id]) {
            stopTimer(card.id, task.id);
        } else {
            startTimer(card.id, task.id, displayDiv, startBtn);
        }
    });

    btnContainer.appendChild(startBtn);

    // Sessions list
    const sessionsList = document.createElement('div');
    sessionsList.className = 'sessions-list';
    if (task.time_sessions && task.time_sessions.length > 0) {
        task.time_sessions.forEach((session, idx) => {
            const item = document.createElement('div');
            item.className = 'session-item';
            item.innerHTML = `<span>Session ${idx + 1}:</span><span>${formatTime(session.duration)}</span>`;
            sessionsList.appendChild(item);
        });
    } else {
        sessionsList.textContent = 'No sessions yet';
    }

    timerDiv.appendChild(displayDiv);
    timerDiv.appendChild(btnContainer);
    timerDiv.appendChild(sessionsList);

    return timerDiv;
}

function appendCard(card) {
    const container = document.getElementById('cardsContainer');
    
    // Remove empty state if present
    const emptyState = container.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.cardId = card.id;

    const total = card.tasks.length;
    const done = card.tasks.filter(t => t.completed).length;

    const headDiv = document.createElement('div');
    headDiv.className = 'card-head';
    headDiv.innerHTML = `
        <input class="card-title-input" value="${esc(card.title)}" placeholder="Card title">
        <span class="card-count">${done}/${total}</span>
        <button class="icon-btn danger remove-card-btn" title="Remove card">&times;</button>
    `;

    const titleInput = headDiv.querySelector('.card-title-input');
    titleInput.addEventListener('input', e => updateCardTitle(card.id, e.target.value));
    headDiv.querySelector('.remove-card-btn').addEventListener('click', () => deleteCard(card.id));

    el.appendChild(headDiv);

    const tasksList = document.createElement('div');
    tasksList.className = 'tasks-list';
    tasksList.dataset.cardId = card.id;

    card.tasks.forEach((task, idx) => {
        const taskRow = createTaskElement(card, task, idx);
        tasksList.appendChild(taskRow);
        const timerUI = createTimerUI(card, task);
        tasksList.appendChild(timerUI);
    });

    const addTaskRow = document.createElement('div');
    addTaskRow.className = 'add-task-row';
    addTaskRow.innerHTML = '<span class="plus">+</span> Add task';
    addTaskRow.addEventListener('click', () => createTask(card.id));
    tasksList.appendChild(addTaskRow);

    el.appendChild(tasksList);

    container.appendChild(el);
}

function appendTask(card, task, taskIndex) {
    const tasksList = document.querySelector(`.tasks-list[data-card-id="${card.id}"]`);
    if (!tasksList) return;

    const taskRow = createTaskElement(card, task, taskIndex);
    const timerUI = createTimerUI(card, task);
    
    // Insert before the "Add task" row
    const addTaskRow = tasksList.querySelector('.add-task-row');
    if (addTaskRow) {
        tasksList.insertBefore(taskRow, addTaskRow);
        tasksList.insertBefore(timerUI, addTaskRow);
    } else {
        tasksList.appendChild(taskRow);
        tasksList.appendChild(timerUI);
    }

    // Update card count
    const card_el = document.querySelector(`.card[data-card-id="${card.id}"]`);
    if (card_el) {
        const total = card.tasks.length;
        const done = card.tasks.filter(t => t.completed).length;
        card_el.querySelector('.card-count').textContent = `${done}/${total}`;
    }
}

function updateDateDisplay() {
    document.getElementById('currentDate').textContent = formatDate(currentDate);
    document.getElementById('datePicker').value = getDateKey(currentDate);
}

function renderCards() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';

    if (cards.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">&#9744;</div>
                <p>Nothing here yet.<br>Add a card to start planning.</p>
            </div>`;
        return;
    }

    cards.forEach((card, ci) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.cardId = card.id;
        el.style.animationDelay = `${ci * 0.05}s`;

        const total = card.tasks.length;
        const done = card.tasks.filter(t => t.completed).length;

        const headDiv = document.createElement('div');
        headDiv.className = 'card-head';
        headDiv.innerHTML = `
            <input class="card-title-input" value="${esc(card.title)}" placeholder="Card title">
            <span class="card-count">${done}/${total}</span>
            <button class="icon-btn danger remove-card-btn" title="Remove card">&times;</button>
        `;

        const titleInput = headDiv.querySelector('.card-title-input');
        titleInput.addEventListener('input', e => updateCardTitle(card.id, e.target.value));
        headDiv.querySelector('.remove-card-btn').addEventListener('click', () => deleteCard(card.id));

        el.appendChild(headDiv);

        const tasksList = document.createElement('div');
        tasksList.className = 'tasks-list';
        tasksList.dataset.cardId = card.id;

        card.tasks.forEach((task, idx) => {
            const taskRow = createTaskElement(card, task, idx);
            tasksList.appendChild(taskRow);
            const timerUI = createTimerUI(card, task);
            tasksList.appendChild(timerUI);
        });

        const addTaskRow = document.createElement('div');
        addTaskRow.className = 'add-task-row';
        addTaskRow.innerHTML = '<span class="plus">+</span> Add task';
        addTaskRow.addEventListener('click', () => createTask(card.id));
        tasksList.appendChild(addTaskRow);

        el.appendChild(tasksList);

        container.appendChild(el);
    });
}

// ═══════════════════════════════════════════
async function exportPDF() {
    const dateStr = formatDate(currentDate);
    
    const opt = {
        margin: [10, 10, 10, 10],
        filename: `Tasks_${getDateKey(currentDate)}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
    };

    const contentDiv = document.createElement('div');
    contentDiv.style.padding = '20px';
    contentDiv.style.fontFamily = 'Arial, sans-serif';
    contentDiv.style.backgroundColor = '#ffffff';
    contentDiv.style.color = '#000000';

    const title = document.createElement('h1');
    title.textContent = `Tasks for ${dateStr}`;
    title.style.marginBottom = '20px';
    title.style.borderBottom = '2px solid #333333';
    title.style.paddingBottom = '10px';
    title.style.color = '#000000';
    contentDiv.appendChild(title);

    let cardIndex = 1;
    cards.forEach(card => {
        const cardDiv = document.createElement('div');
        cardDiv.style.marginBottom = '20px';
        cardDiv.style.borderLeft = '4px solid #0066cc';
        cardDiv.style.paddingLeft = '15px';

        const cardTitle = document.createElement('h2');
        cardTitle.textContent = `${cardIndex}. ${card.title}`;
        cardTitle.style.fontSize = '16px';
        cardTitle.style.marginBottom = '10px';
        cardTitle.style.color = '#0066cc';

        const tasksList = document.createElement('ul');
        tasksList.style.marginLeft = '20px';
        tasksList.style.marginBottom = '0';
        tasksList.style.color = '#000000';

        card.tasks.forEach((task, idx) => {
            const li = document.createElement('li');
            li.style.marginBottom = '8px';
            li.style.color = task.completed ? '#999999' : '#000000';
            if (task.completed) {
                li.style.textDecoration = 'line-through';
            }

            const text = task.completed ? `${task.text} [COMPLETED]` : task.text;
            const totalTime = getTotalSessionTime(task.time_sessions);
            const timeStr = totalTime > 0 ? ` (${formatTime(totalTime)})` : '';

            li.innerHTML = `<strong>${idx + 1}.</strong> ${text}${timeStr}`;

            // Add sessions if any
            if (task.time_sessions && task.time_sessions.length > 0) {
                const sessionsList = document.createElement('ul');
                sessionsList.style.marginLeft = '20px';
                sessionsList.style.fontSize = '12px';
                sessionsList.style.color = '#666666';
                task.time_sessions.forEach((session, sIdx) => {
                    const sessionLi = document.createElement('li');
                    sessionLi.textContent = `Session ${sIdx + 1}: ${formatTime(session.duration)}`;
                    sessionsList.appendChild(sessionLi);
                });
                li.appendChild(sessionsList);
            }

            tasksList.appendChild(li);
        });

        cardDiv.appendChild(cardTitle);
        cardDiv.appendChild(tasksList);
        contentDiv.appendChild(cardDiv);
        cardIndex++;
    });

    const empty = cards.length === 0;
    if (empty) {
        const p = document.createElement('p');
        p.textContent = 'No tasks for this date.';
        p.style.color = '#666666';
        contentDiv.appendChild(p);
    }

    opt.html2canvas.onclone = function(clonedDocument) {
        const clonedDiv = clonedDocument.body.querySelector('div');
        if (clonedDiv) {
            clonedDiv.style.margin = '0';
        }
    };

    await html2pdf().set(opt).from(contentDiv).save();
    showToast('PDF exported!');
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'Please fill in both fields'; return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

    btn.disabled = false; btn.textContent = 'Sign In';

    if (error) { errEl.textContent = error.message; return; }

    currentUser = data.user;
    await enterApp();
    showToast('Welcome back!');
}

async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    const errEl = document.getElementById('regError');
    const successEl = document.getElementById('regSuccess');
    errEl.textContent = ''; successEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'Please fill in all fields'; return; }
    if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
    if (pass !== pass2) { errEl.textContent = "Passwords don't match"; return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true; btn.textContent = 'Creating...';

    const { data, error } = await sb.auth.signUp({ email, password: pass });

    btn.disabled = false; btn.textContent = 'Create Account';

    if (error) { errEl.textContent = error.message; return; }

    // If email confirmation is disabled in Supabase, user is logged in immediately
    if (data.session) {
        currentUser = data.user;
        await enterApp();
        showToast('Account created!');
    } else {
        // Email confirmation required
        successEl.textContent = 'Check your email to confirm your account, then sign in.';
    }
}

async function handleLogout() {
    await sb.auth.signOut();
    currentUser = null; cards = [];
    document.getElementById('app').classList.remove('active');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
}

function restoreRunningTimers() {
    const saved = localStorage.getItem('runningTimers');
    if (!saved) return;
    let savedTimers;
    try { savedTimers = JSON.parse(saved); } catch { return; }
    for (const [taskId, { startTime, cardId }] of Object.entries(savedTimers)) {
        const timerSection = document.querySelector(`.timer-section[data-task-id="${taskId}"]`);
        if (!timerSection) continue;
        const displayDiv = timerSection.querySelector('.timer-display');
        const startBtn = timerSection.querySelector('.timer-btn');
        if (!displayDiv || !startBtn) continue;
        startTimer(cardId, taskId, displayDiv, startBtn, startTime);
    }
}

async function enterApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    document.getElementById('displayUser').textContent = currentUser.email;
    currentDate = new Date();
    updateDateDisplay();
    await fetchCards();
    renderCards();
    restoreRunningTimers();
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
async function init() {
    const loading = document.getElementById('loadingOverlay');

    // Check existing session
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentUser = session.user;
        await enterApp();
    }

    loading.classList.add('fade-out');
    setTimeout(() => loading.style.display = 'none', 300);

    // Auth UI toggles
    document.getElementById('showRegister').addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    });
    document.getElementById('showLogin').addEventListener('click', () => {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loginError').textContent = '';
    });

    // Auth buttons
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);

    // Enter key on password fields
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('regPass2').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });

    // Date navigation
    document.getElementById('prevDay').addEventListener('click', () => {
        const d = new Date(currentDate); d.setDate(d.getDate() - 1); changeDate(d);
    });
    document.getElementById('nextDay').addEventListener('click', () => {
        const d = new Date(currentDate); d.setDate(d.getDate() + 1); changeDate(d);
    });
    document.getElementById('todayBtn').addEventListener('click', () => changeDate(new Date()));
    document.getElementById('calendarPicker').addEventListener('click', () => {
        document.getElementById('datePicker').showPicker();
    });
    document.getElementById('datePicker').addEventListener('change', e => {
        if (e.target.value) changeDate(new Date(e.target.value + 'T12:00:00'));
    });

    // Add card
    document.getElementById('addCardBtn').addEventListener('click', createCard);

    // Diary redirect
    document.getElementById('diaryBtn').addEventListener('click', () => {
        window.location.href = 'Diary.html';
    });

    // Export PDF
    document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
}

// ═══════════════════════════════════════════
// Mobile Touch Drag & Drop
// ═══════════════════════════════════════════
(function setupTouchDragDrop() {
    let touchDragInfo = null;   // { cardId, taskId }
    let ghostEl = null;
    let lastDropTarget = null;

    function getTaskRowFromPoint(x, y) {
        const els = document.elementsFromPoint(x, y);
        for (const el of els) {
            const row = el.closest('.task-row');
            if (row && row !== ghostEl) return row;
        }
        return null;
    }

    document.addEventListener('touchstart', (e) => {
        const row = e.target.closest('.task-row[draggable="true"]');
        if (!row) return;
        // Only initiate drag on long press (300ms)
        const touch = e.touches[0];
        let moved = false;
        let timer = setTimeout(() => {
            if (moved) return;
            const cardEl = row.closest('.card');
            if (!cardEl) return;
            touchDragInfo = {
                cardId: cardEl.dataset.cardId,
                taskId: row.dataset.taskId
            };
            // Create ghost
            ghostEl = row.cloneNode(true);
            ghostEl.style.cssText = `position:fixed;z-index:9999;opacity:0.8;pointer-events:none;
                width:${row.offsetWidth}px;left:${touch.clientX - row.offsetWidth/2}px;
                top:${touch.clientY - row.offsetHeight/2}px;background:var(--surface2);
                border-radius:8px;border:1px solid var(--accent-dim);`;
            document.body.appendChild(ghostEl);
            row.style.opacity = '0.3';
            if (navigator.vibrate) navigator.vibrate(30);
        }, 300);

        row.addEventListener('touchmove', () => { moved = true; clearTimeout(timer); }, { once: true });
        row.addEventListener('touchend', () => clearTimeout(timer), { once: true });
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
        if (!touchDragInfo || !ghostEl) return;
        e.preventDefault();
        const touch = e.touches[0];
        ghostEl.style.left = `${touch.clientX - ghostEl.offsetWidth/2}px`;
        ghostEl.style.top = `${touch.clientY - ghostEl.offsetHeight/2}px`;

        // Highlight drop target
        const target = getTaskRowFromPoint(touch.clientX, touch.clientY);
        if (lastDropTarget && lastDropTarget !== target) {
            lastDropTarget.classList.remove('drag-over');
        }
        if (target && target.dataset.taskId !== touchDragInfo.taskId) {
            target.classList.add('drag-over');
            lastDropTarget = target;
        }
    }, { passive: false });

    document.addEventListener('touchend', async (e) => {
        if (!touchDragInfo || !ghostEl) return;
        const touch = e.changedTouches[0];

        if (ghostEl) { ghostEl.remove(); ghostEl = null; }
        if (lastDropTarget) { lastDropTarget.classList.remove('drag-over'); }

        // Restore opacity of dragged row
        const srcRow = document.querySelector(`.task-row[data-task-id="${touchDragInfo.taskId}"]`);
        if (srcRow) srcRow.style.opacity = '';

        const target = getTaskRowFromPoint(touch.clientX, touch.clientY);
        if (target && target.dataset.taskId !== touchDragInfo.taskId) {
            const toCardEl = target.closest('.card');
            if (toCardEl) {
                await moveTask(touchDragInfo.cardId, touchDragInfo.taskId, toCardEl.dataset.cardId, target.dataset.taskId);
            }
        }

        touchDragInfo = null;
        lastDropTarget = null;
    });
})();

init();
</script>
